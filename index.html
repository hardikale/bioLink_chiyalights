<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiyaLights | Your Favorite Chiya Spot</title>
    <link href="./output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-[#F6BC66] flex flex-col items-center h-[100dvh] overflow-hidden">

    <div class="w-full h-[18vh] min-h-[120px] bg-[#C8642F] relative flex justify-center items-end shrink-0">
        <div class="absolute inset-0 opacity-60" style="background-image: url('gallery/icon_pattern.png'); background-size: 200px;"></div>
        
        <div class="relative translate-y-1/2 z-20">
            <div class="w-28 h-28 sm:w-32 sm:h-32 rounded-full border-4 border-[#F6BC66] overflow-hidden bg-[#5C4D44] flex items-center justify-center shadow-lg">
                <img src="gallery/first.jpeg" alt="ChiyaLights Logo" class="w-full h-full object-cover">
            </div>
        </div>
    </div>

    <div class="mt-16 sm:mt-20 w-full max-w-md px-8 flex flex-col items-center text-center shrink-0 z-10">
        <h1 class="text-3xl sm:text-4xl font-bold text-textcolor     leading-tight">ChiyaLights</h1>
        <p class="text-textcolor font-medium text-base sm:text-lg mt-0.5 sm:mt-2">Your new favorite chiya spot !</p>
    </div>

    <div class="flex-1 w-full max-w-[17rem] sm:max-w-xs px-4 flex flex-col justify-evenly sm:justify-center py-3 sm:py-6 z-10 shrink min-h-[140px]">
        
        <div class="space-y-0.5 sm:space-y-1 flex flex-col">
            <a href="https://www.instagram.com/chiyalights_/" 
               class="flex items-center space-x-3 sm:space-x-4 
               p-2.5 sm:p-4 rounded-full shadow-md 
               transform transition duration-150 
               bg-gradient-to-r from-[#C8642F] to-[#f0a432]
               active:scale-95 ">
                <div class="bg-white p-1.5 sm:p-2 rounded-full shrink-0">
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="w-4 h-4 sm:w-5 sm:h-5 object-contain" alt="Insta">
                </div>
                <span class="text-white font-bold text-[15px] sm:text-lg truncate">Follow us on Instagram</span>
            </a>
        </div>

        <div class="space-y-0.5 sm:space-y-1 flex flex-col mt-2 sm:mt-5">
            <a href="https://tiktok.com/@chiyalights" 
               class="flex items-center space-x-3 sm:space-x-4 
               p-2.5 sm:p-4 rounded-full shadow-md 
               transform transition duration-150 
               bg-gradient-to-r from-[#C8642F] to-[#f0a432]
               active:scale-95 ">
                <div class="bg-white p-1.5 sm:p-2 rounded-full shrink-0">
                    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="w-4 h-4 sm:w-5 sm:h-5 object-contain" alt="Tiktok">
                </div>
                <span class="text-white font-bold text-[15px] sm:text-lg truncate">Watch us on Tiktok</span>
            </a>
        </div>

        <div class="space-y-0.5 sm:space-y-1 flex flex-col mt-2 sm:mt-5">
            <a href="https://www.google.com/maps/place/ChiyaLights/@27.5813764,84.4931929,17z/data=!3m1!4b1!4m6!3m5!1s0x3994ef6c3bf11629:0x55cec748b66f048f!8m2!3d27.5813764!4d84.4931929!16s%2Fg%2F11ymfcy92k?entry=ttu&g_ep=EgoyMDI2MDMyMy4xIKXMDSoASAFQAw%3D%3D" 
               class="flex items-center space-x-3 sm:space-x-4 
               p-2.5 sm:p-4 rounded-full shadow-md 
               transform transition duration-150 
               bg-gradient-to-r from-[#C8642F] to-[#f0a432]
               active:scale-95 ">
                <div class="bg-white p-1.5 sm:p-2 rounded-full shrink-0">
                    <img src="https://cdn-icons-png.flaticon.com/512/1865/1865269.png" class="w-4 h-4 sm:w-5 sm:h-5 object-contain" alt="Maps">
                </div>
                <span class="text-white font-bold text-[15px] sm:text-lg truncate">Rate and Review us</span>
            </a>
        </div>
    </div>

    <div class="mt-auto w-full shrink-0">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none" class="w-full h-[6vh] min-h-[40px] max-h-[100px] block">
            <path d="M0.00,49.98 C149.99,150.00 349.20,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z" style="stroke: none; fill: #F1E4D1;"></path>
        </svg>
    </div>

</body>
</html>
